[ package ]
name = "web_scraper"
version = "0.1.0"
edition = "2024"

[ dependencies ]
reqwest = { version = "0.13.2", features = ["blocking", "json"] }
scraper = "0.26.0"
tokio = { version = "1.52.0", features = ["full", "time"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
chrono = "0.4.44"