[ package ]
name = "web_scraper"
version = "0.1.0"
edition = "2021"

[ dependencies ]
reqwest = { version = "0.12.15", features = ["blocking", "json"] }
scraper = "0.23.1"
tokio = { version = "1.28", features = ["full", "time"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = "0.4"